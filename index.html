<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to YouTube...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #f5f5f0;
      overflow: hidden;
    }

    .bg-grain {
      position: fixed;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(255, 0, 0, 0.25);
    }

    .icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    p {
      color: #888;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .loader {
      width: 32px;
      height: 32px;
      margin: 0 auto 2rem;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fallback-link {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      color: #f5f5f0;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: all 0.3s ease;
    }

    .fallback-link:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="bg-grain"></div>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
    </div>
    <h1>Opening YouTube</h1>
    <p>Taking you there now...</p>
    <div class="loader"></div>
    <a id="fallback" class="fallback-link" href="#">Open manually</a>
  </div>

  <script>
    // ============================================================
    //  CONFIGURE THESE TWO VALUES:
    // ============================================================
    const YOUTUBE_CHANNEL_ID = 'UC-4b7WxY90dR3f07Y1mWwSA';
    const YOUTUBE_CHANNEL_URL = 'https://www.youtube.com/@MatthewKim10';
    // ============================================================

    const deepLink = `vnd.youtube://www.youtube.com/channel/${YOUTUBE_CHANNEL_ID}`;

    // Set fallback link
    document.getElementById('fallback').href = YOUTUBE_CHANNEL_URL;

    // Try the deep link first (opens YouTube app)
    window.location = deepLink;

    // If still here after 1.5s, redirect to web URL
    setTimeout(() => {
      window.location = YOUTUBE_CHANNEL_URL;
    }, 1500);
  </script>
</body>
</html>
